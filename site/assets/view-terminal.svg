<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <clipPath id="win"><rect x="0" y="0" width="1000" height="600" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#win)">
    <rect width="1000" height="600" fill="#0B0E14"/>
    <!-- title bar -->
    <rect width="1000" height="34" fill="#121826"/>
    <circle cx="20" cy="17" r="6" fill="#E8685A"/>
    <circle cx="40" cy="17" r="6" fill="#E8B84B"/>
    <circle cx="60" cy="17" r="6" fill="#4BC26B"/>
    <text x="500" y="21" fill="#5B6577" font-size="12.5" text-anchor="middle">sparsify — run qwen:30b</text>

    <!-- header status line -->
    <text x="20" y="62" font-size="13">
      <tspan fill="#E8A33D" font-weight="bold">▚ sparsify</tspan><tspan fill="#5B6577">  ·  </tspan><tspan fill="#E7EBF2" font-weight="bold">Qwen3-30B-A3B</tspan><tspan fill="#5B6577">  ·  Apple Silicon  ·  16.3 GB experts on SSD  ·  budget 4.5 GB  </tspan><tspan fill="#3FB27F">●</tspan>
    </text>
    <line x1="20" y1="76" x2="980" y2="76" stroke="#232B3C"/>

    <!-- turn 1 -->
    <text x="20" y="108" font-size="13.5"><tspan fill="#E8A33D" font-weight="bold">❯ what does the sparsify repo do? fetch its readme</tspan></text>
    <!-- tool card -->
    <rect x="20" y="120" width="360" height="24" rx="6" fill="#0E1420" stroke="#232B3C"/>
    <rect x="20" y="120" width="2" height="24" fill="#3FB27F"/>
    <text x="34" y="136" fill="#9AA5B8" font-size="12">→ fetch_url(url=github.com/daylinkltd/sparsify)</text>

    <text x="20" y="170" font-size="13.5" fill="#E7EBF2">Sparsify runs Mixture-of-Experts models larger than your RAM: expert</text>
    <text x="20" y="190" font-size="13.5" fill="#E7EBF2">weights stay on SSD and page into a bounded cache only when the router</text>
    <text x="20" y="210" font-size="13.5" fill="#E7EBF2">selects them — with output byte-identical to full-RAM inference.</text>
    <text x="20" y="236" font-size="12" fill="#5B6577">42 tokens · 11.0 tok/s · rss 4.15 GB · cache 97% hit</text>

    <!-- turn 2 -->
    <text x="20" y="276" font-size="13.5"><tspan fill="#E8A33D" font-weight="bold">❯ write hello.py that prints "sparsify works", then run it</tspan></text>
    <rect x="20" y="288" width="300" height="24" rx="6" fill="#0E1420" stroke="#232B3C"/>
    <rect x="20" y="288" width="2" height="24" fill="#3FB27F"/>
    <text x="34" y="304" fill="#9AA5B8" font-size="12">→ write_file(path=hello.py)</text>
    <rect x="20" y="318" width="300" height="24" rx="6" fill="#0E1420" stroke="#232B3C"/>
    <rect x="20" y="318" width="2" height="24" fill="#3FB27F"/>
    <text x="34" y="334" fill="#9AA5B8" font-size="12">→ run_shell(command=python hello.py)</text>
    <text x="20" y="368" font-size="13.5" fill="#E7EBF2">Done — the script printed: <tspan fill="#E8A33D">sparsify works</tspan></text>
    <text x="20" y="394" font-size="12" fill="#5B6577">31 tokens · 10.6 tok/s · rss 4.18 GB · cache 96% hit</text>

    <!-- input + status bar -->
    <line x1="20" y1="540" x2="980" y2="540" stroke="#232B3C"/>
    <text x="20" y="566" font-size="13.5"><tspan fill="#E8A33D" font-weight="bold">❯ </tspan><tspan fill="#5B6577">▌</tspan></text>
    <rect x="0" y="580" width="1000" height="20" fill="#121826"/>
    <text x="20" y="594" font-size="11.5">
      <tspan fill="#E8A33D">▚</tspan><tspan fill="#9AA5B8"> Qwen3-30B-A3B  ·  session 73 tok  ·  </tspan><tspan fill="#E7EBF2">enter</tspan><tspan fill="#9AA5B8"> send · </tspan><tspan fill="#E7EBF2">esc+enter</tspan><tspan fill="#9AA5B8"> newline · </tspan><tspan fill="#E7EBF2">/help</tspan><tspan fill="#9AA5B8"> commands</tspan>
    </text>
  </g>
</svg>
